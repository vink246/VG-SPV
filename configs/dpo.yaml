# VG-SPV DPO / VG-fDPO / V-DPO training (see iclr2026_conference.tex, Approach).
# Defaults: Method 1 semantic scaler (s_sem), L_total = L_VG-fDPO (V-DPO is opt-in).
# Set use_vdpo: true to add the paper's Eq. (7) contrastive term (requires
# chosen_perturbed_* columns in the dataset and one extra forward pass per step).
# Override any key via CLI: python train/run_dpo.py --learning-rate 1e-5

model_name: llava-hf/llava-v1.6-mistral-7b-hf
data_path: null
eval_data_path: null
eval_steps: null
output_dir: outputs/dpo
prompt_instruction: null

num_train_epochs: 1
per_device_train_batch_size: 4
gradient_accumulation_steps: 8
learning_rate: 5.0e-5
# Token cap for the full sequence (TRL DPOConfig.max_length only; max_prompt_length removed in recent trl).
max_length: 8192
beta: 0.1
bf16: true
ref_8bit: false
logging_steps: 10
save_steps: 200
save_total_limit: 3

# L_VG-fDPO (segment-masked preference); set false for plain full-sequence DPO
use_vgfdpo: true
# L_V-DPO contrastive term; paper Eq. (7) with coefficient alpha_vdpo.
# OFF by default -- enabling this requires chosen_perturbed_* columns in the
# dataset and roughly doubles the per-step forward FLOPs for the policy.
use_vdpo: false
alpha_vdpo: 0.1
vdpo_margin_m: 0.0
# Paper: alpha_format between 12 and 15 for format-fail fallback (Eq. 5)
alpha_format: 13.0
grounding_mode: semantic
alpha_sem: 1.0
alpha_iou: 1.0
s_fallback_value: 1.0
strict_scaler_inputs: false

lora_r: 64
lora_alpha: 128
lora_dropout: 0.05
lora_adapter_path: null
merge_lora_adapter: false
