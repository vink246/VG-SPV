name: vg-spv
channels:
  - pytorch
  - nvidia
  - conda-forge
  - nodefaults
dependencies:
  # Core Python & Build tools
  - python=3.10
  - pip
  - ninja
  - packaging
  
  # PyTorch ecosystem (Compiled with CUDA 12.1)
  - pytorch>=2.4.0
  - torchvision
  - torchaudio
  - pytorch-cuda=12.1
  
  # Pip dependencies for specific ML libraries
  - pip:
      - transformers>=4.45.0
      - accelerate
      - peft
      - trl
      - datasets
      - qwen-vl-utils
      - gdown
      # Install after env create with --no-build-isolation (see scripts/):
      # - scripts/install_grounding_dino.sh  (Grounding DINO)
      # - scripts/install_flash_attn.sh      (optional, flash-attn)